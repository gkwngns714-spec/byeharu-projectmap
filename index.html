<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Byeharu — Project Map</title>
<style>
  :root {
    --bg: #07090f;
    --panel: rgba(14, 18, 30, 0.86);
    --line: rgba(255, 255, 255, 0.11);
    --text: #e8ecf5;
    --dim: #8792ab;
    --accent: #35c1e0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  /* touch-action:none — the canvas handles its own drag/pinch, so the browser
     must not steal the gesture to scroll or page-zoom. */
  #scene { position: fixed; inset: 0; touch-action: none; }
  .panel { position: fixed; background: var(--panel); backdrop-filter: blur(14px);
    border: 1px solid var(--line); border-radius: 12px; }

  /* tabs */
  #tabs { top: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 3px; padding: 3px; z-index: 5; }
  #tabs button { padding: 6px 15px; border: 0; border-radius: 9px; background: transparent;
    color: var(--dim); font: inherit; font-weight: 600; cursor: pointer; }
  #tabs button:hover { color: var(--text); }
  #tabs button.on { background: rgba(255,255,255,.1); color: var(--text); }

  /* tree view */
  #treeWrap { position: fixed; inset: 0; overflow: auto; display: none; padding: 66px 340px 70px 282px; }
  #treeWrap.on { display: block; }
  #tree { display: block; }
  #tree text { font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif; pointer-events: none; }
  #tree .tn:hover rect { stroke-opacity: 1; }
  .treeOnly, .mapOnly { display: block; }
  body.tree .mapOnly, body.map .treeOnly { display: none; }
  body.timeline .treeOnly, body.timeline .mapOnly { display: none; }
  body.method .treeOnly, body.method .mapOnly { display: none; }
  .timelineOnly, .methodOnly { display: none; }
  body.timeline .timelineOnly { display: block; }
  body.method .methodOnly { display: block; }

  /* timeline view */
  #timelineWrap { position: fixed; inset: 0; overflow: auto; display: none; padding: 66px 340px 70px 282px; }
  #timelineWrap.on { display: block; }
  #timeline { max-width: 920px; margin: 0 auto; }
  .tl-sec { position: relative; margin-bottom: 26px; padding: 16px 18px 14px; background: var(--panel);
    backdrop-filter: blur(14px); border: 1px solid var(--line); border-radius: 12px; }
  .tl-sec + .tl-sec::before { content: ""; position: absolute; top: -27px; left: 30px; width: 2px; height: 27px;
    background: var(--line); }
  .tl-era { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: var(--dim); font-weight: 600; }
  .tl-sec h2 { margin: 2px 0; font-size: 15px; }
  .tl-desc { color: var(--dim); font-size: 11px; margin-bottom: 12px; line-height: 1.5; }
  .tl-spine { overflow-x: auto; margin-bottom: 10px; }
  .tl-subhead { font-size: 10px; text-transform: uppercase; letter-spacing: .09em; color: var(--dim);
    font-weight: 600; margin: 14px 0 6px; }
  .tl-row { display: grid; grid-template-columns: 86px minmax(0, 1fr) auto auto; gap: 10px; align-items: center;
    padding: 4px 8px; margin: 0 -8px; border-radius: 7px; cursor: pointer; }
  .tl-row:hover { background: rgba(255,255,255,.06); }
  .tl-row.sel { outline: 1px solid rgba(255,255,255,.7); }
  /* log entries are records, not graph nodes — they must not pretend to be clickable */
  .tl-row.static { cursor: default; }
  .tl-row.static:hover { background: none; }
  .tl-date { color: var(--dim); font-variant-numeric: tabular-nums; font-size: 11px; }
  .tl-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
  .tl-count { color: var(--dim); font-variant-numeric: tabular-nums; font-size: 11px; text-align: right; min-width: 46px; }
  .tl-chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 999px;
    font-size: 10.5px; font-weight: 600; flex: none; }
  .tl-fchip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 999px;
    font-size: 10.5px; cursor: pointer; }
  .tl-fchip:hover { filter: brightness(1.25); }
  .tl-fchip.sel { outline: 1px solid rgba(255,255,255,.7); }
  .tl-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .tl-flips { display: flex; flex-wrap: wrap; gap: 6px; margin: 2px 0 8px 96px; }
  .tl-note { color: var(--dim); font-size: 11.5px; margin: 4px 0; }
  .tl-table { border-collapse: collapse; margin-bottom: 4px; }
  .tl-table th, .tl-table td { padding: 2px 18px 2px 0; text-align: right; font-size: 11.5px;
    font-variant-numeric: tabular-nums; }
  .tl-table th { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; color: var(--dim); }
  .tl-table td:first-child, .tl-table th:first-child { text-align: left; color: var(--dim); }
  .tl-table tr.tot td { border-top: 1px solid var(--line); color: var(--text); }
  .tl-row.dm, .tl-fchip.dm { opacity: .35; }
  select.act { width: 100%; padding: 7px; border-radius: 8px; border: 1px solid var(--line);
    background: rgba(0,0,0,.35); color: var(--text); font: inherit; cursor: pointer; }
  .hint { color: var(--dim); font-size: 10.5px; margin-top: 7px; line-height: 1.45; }

  /* method view — a readable doc, same idiom as the timeline (.tl-sec cards) plus
     prose-specific bits: a paragraph, a numbered arc, an inert (missing-node) citation,
     and the closing source list. */
  #methodWrap { position: fixed; inset: 0; overflow: auto; display: none; padding: 66px 340px 70px 282px; }
  #methodWrap.on { display: block; }
  #method { max-width: 860px; margin: 0 auto; }
  .mth-p { color: #b9c2d6; font-size: 12.5px; line-height: 1.65; margin: 0 0 12px; }
  .mth-p code { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 11.5px;
    color: var(--accent); background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 4px; }
  .mth-p b { color: var(--text); }
  .mth-arc { color: #b9c2d6; font-size: 12.5px; line-height: 1.7; margin: 0 0 12px; padding-left: 20px; }
  .mth-arc li { margin-bottom: 8px; }
  .mth-arc b { color: var(--text); }
  .mth-missing { color: var(--dim); font-style: italic; }
  .mth-src { color: var(--dim); font-size: 11px; line-height: 1.6; border-top: 1px solid var(--line);
    padding-top: 10px; margin-top: 6px; }
  .mth-src code { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }

  /* left rail */
  #controls { top: 14px; left: 14px; width: 252px; max-height: calc(100vh - 28px);
    overflow-y: auto; padding: 14px; }
  #controls h1 { margin: 0 0 2px; font-size: 15px; letter-spacing: .2px; }
  #controls .sub { color: var(--dim); font-size: 11px; margin-bottom: 12px; }
  .grp { margin-bottom: 14px; }
  .grp > h2 { font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--dim); margin: 0 0 7px; font-weight: 600; }
  label.row { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer; user-select: none; }
  label.row:hover { color: #fff; }
  label.row input { accent-color: var(--accent); margin: 0; }
  .swatch { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .count { margin-left: auto; color: var(--dim); font-variant-numeric: tabular-nums; font-size: 11px; }
  #search { width: 100%; padding: 7px 9px; border-radius: 8px; border: 1px solid var(--line);
    background: rgba(0,0,0,.35); color: var(--text); font: inherit; }
  #search:focus { outline: 1px solid var(--accent); }
  button.act { width: 100%; padding: 7px; border-radius: 8px; border: 1px solid var(--line);
    background: rgba(255,255,255,.05); color: var(--text); font: inherit; cursor: pointer; }
  button.act:hover { background: rgba(255,255,255,.11); }

  /* right inspector */
  #inspect { top: 14px; right: 14px; width: 320px; max-height: calc(100vh - 28px);
    overflow-y: auto; padding: 14px; display: none; }
  #inspect.on { display: block; }
  #inspect h3 { margin: 0 0 3px; font-size: 14px; word-break: break-word; }
  #inspect .kind { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; margin: 9px 0; }
  .why { color: var(--dim); font-size: 11.5px; border-left: 2px solid var(--line); padding-left: 8px; margin: 9px 0; }
  .file { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 10.5px;
    color: var(--accent); word-break: break-all; }
  .det { font-size: 11.5px; color: #b9c2d6; max-height: 110px; overflow-y: auto; margin: 8px 0; }
  .rel h4 { font-size: 10px; text-transform: uppercase; letter-spacing: .09em; color: var(--dim);
    margin: 12px 0 5px; font-weight: 600; }
  .rel div { padding: 2px 0; cursor: pointer; font-size: 11.5px; display: flex; gap: 6px; align-items: center; }
  .rel div:hover { color: #fff; }
  .rel .t { color: var(--dim); font-size: 10px; flex: none; }

  /* bottom status */
  #hud { bottom: 14px; left: 14px; padding: 9px 13px; font-size: 11.5px; color: var(--dim); }
  #hud b { color: var(--text); font-weight: 600; }
  #hud .warn { color: #ffb03a; }

  /* Working now — the live WIP overlay. One row per open PR; the pulsing map
     nodes are those same PRs' migrations under the knife right now. */
  #workingNow { bottom: 14px; right: 14px; width: 288px; max-width: calc(100vw - 28px);
    padding: 11px 13px 9px; display: none; z-index: 6; }
  body.map #workingNow.on { display: block; }
  #workingNow .wn-head { display: flex; align-items: center; gap: 7px; font-size: 10px;
    text-transform: uppercase; letter-spacing: .12em; color: var(--dim); font-weight: 700; margin-bottom: 9px; }
  #workingNow .wn-live { width: 7px; height: 7px; border-radius: 50%; background: #ff2d95;
    box-shadow: 0 0 0 0 rgba(255,45,149,.6); animation: wnbeat 1.6s ease-out infinite; }
  @keyframes wnbeat { 0% { box-shadow: 0 0 0 0 rgba(255,45,149,.55); } 70% { box-shadow: 0 0 0 7px rgba(255,45,149,0); } 100% { box-shadow: 0 0 0 0 rgba(255,45,149,0); } }
  #workingNow .wn-when { margin-left: auto; font-size: 9.5px; letter-spacing: .04em; color: var(--dim); font-weight: 600; }
  #workingNow .wn-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; cursor: pointer;
    border-top: 1px solid var(--line); }
  #workingNow .wn-item:first-of-type { border-top: 0; }
  #workingNow .wn-item:hover .wn-title { color: var(--text); }
  #workingNow .wn-dot { flex: 0 0 auto; width: 9px; height: 9px; border-radius: 50%; margin-top: 3px;
    animation: wnpulse 1.4s ease-in-out infinite; }
  @keyframes wnpulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  #workingNow .wn-body { min-width: 0; }
  #workingNow .wn-title { font-size: 11.5px; color: var(--dim); line-height: 1.35; }
  #workingNow .wn-meta { font-size: 10px; color: var(--dim); opacity: .8; margin-top: 1px; }
  #workingNow .wn-empty { font-size: 11px; color: var(--dim); }
  @media (prefers-reduced-motion: reduce) { #workingNow .wn-live, #workingNow .wn-dot { animation: none; } }
  #tip { position: fixed; pointer-events: none; padding: 5px 9px; border-radius: 7px;
    background: rgba(0,0,0,.9); border: 1px solid var(--line); font-size: 11.5px;
    display: none; z-index: 10; white-space: nowrap; }
  #loading { position: fixed; inset: 0; display: grid; place-items: center; color: var(--dim); }

  /* the drawer toggle + scrim exist only on small screens */
  #menuBtn, #scrim { display: none; }

  /* ── small screens ─────────────────────────────────────────────────────────
     The desktop layout parks a 252px rail, centred tabs and a full-width HUD on
     top of each other once the viewport is a phone. Below 860px the rail
     becomes a drawer, the inspector becomes a bottom sheet, and the top row is
     laid out so nothing overlaps anything. */
  @media (max-width: 860px) {
    #menuBtn { display: block; position: fixed; top: 10px; left: 10px; z-index: 30;
      padding: 9px 13px; font: inherit; font-size: 15px; line-height: 1; color: var(--text);
      background: var(--panel); border: 1px solid var(--line); border-radius: 11px; cursor: pointer; }
    #menuBtn[aria-expanded="true"] { color: var(--accent); }

    #tabs { top: 10px; right: 10px; left: auto; transform: none; z-index: 20; }
    #tabs button { padding: 7px 11px; font-size: 12px; }

    #controls { top: 0; left: 0; bottom: 0; width: min(86vw, 310px); max-height: 100vh;
      border-radius: 0 14px 14px 0; border-left: 0; padding-top: 56px; z-index: 40;
      transform: translateX(-102%); transition: transform .22s ease;
      -webkit-overflow-scrolling: touch; }
    #controls.open { transform: none; }

    #scrim { display: block; position: fixed; inset: 0; z-index: 35;
      background: rgba(0,0,0,.55); opacity: 0; pointer-events: none; transition: opacity .22s ease; }
    #scrim.on { opacity: 1; pointer-events: auto; }

    /* inspector as a bottom sheet, so it never fights the map for width */
    #inspect { top: auto; right: 0; left: 0; bottom: 0; width: auto;
      max-height: 54vh; border-radius: 14px 14px 0 0; z-index: 25; padding-bottom: 20px; }

    #hud { left: 8px; right: 8px; bottom: 8px; font-size: 10px; line-height: 1.45;
      padding: 7px 10px; max-height: 4.4em; overflow: hidden; }

    #treeWrap { padding: 58px 14px 86px 14px; }
    #timelineWrap { padding: 58px 14px 86px 14px; }
    #methodWrap { padding: 58px 14px 86px 14px; }
    .tl-row { grid-template-columns: 56px minmax(0, 1fr) auto; gap: 8px; }
    .tl-row .tl-count { display: none; }
    .tl-chip .ct { display: none; }  /* the swatch alone carries the status on a phone */
    .tl-flips { margin-left: 20px; }
    #tip { display: none !important; }  /* no hover on touch — the sheet does this job */
  }

  @media (max-width: 860px) and (orientation: landscape) {
    #inspect { max-height: 78vh; width: min(56vw, 340px); left: auto; right: 0; top: 0; bottom: 0;
      border-radius: 14px 0 0 14px; }
    #hud { right: auto; max-width: 60vw; }
  }
</style>
  <script type="module" crossorigin src="./assets/index-DwkrxoS_.js"></script>
</head>
<body>
  <div id="loading">building the map…</div>
  <canvas id="scene"></canvas>
  <div id="treeWrap"><svg id="tree"></svg></div>
  <div id="timelineWrap"><div id="timeline"></div></div>
  <div id="methodWrap"><div id="method"></div></div>

  <button id="menuBtn" aria-label="Filters and options" aria-expanded="false" aria-controls="controls">☰</button>
  <div id="scrim"></div>

  <nav class="panel" id="tabs">
    <button data-tab="map" class="on">3D Map</button>
    <button data-tab="tree">조직도 Tree</button>
    <button data-tab="timeline">연혁 Timeline</button>
    <button data-tab="method">⚙ Method</button>
  </nav>

  <aside class="panel" id="controls">
    <h1>Byeharu — Project Map</h1>
    <div class="sub" id="subtitle">—</div>

    <div class="grp">
      <input id="search" placeholder="Search nodes…" autocomplete="off" />
    </div>

    <div class="grp treeOnly">
      <h2>Arrange by</h2>
      <select class="act" id="treeMode">
        <option value="roadmap">What is next (roadmap)</option>
        <option value="system">Ownership (조직도)</option>
        <option value="build">The order we built it</option>
        <option value="feature">Feature gate</option>
      </select>
      <div class="hint" id="treeHint"></div>
    </div>

    <div class="grp treeOnly">
      <h2>Tree</h2>
      <label class="row"><button class="act" id="expandAll">Expand all</button></label>
      <label class="row"><button class="act" id="collapseAll">Collapse all</button></label>
    </div>

    <div class="grp timelineOnly">
      <h2>Timeline</h2>
      <div class="hint" id="timelineHint"></div>
    </div>

    <div class="grp methodOnly">
      <h2>Method</h2>
      <div class="hint" id="methodHint"></div>
    </div>

    <div class="grp">
      <h2>Status</h2>
      <div id="statusFilters"></div>
    </div>

    <div class="grp mapOnly">
      <h2>Node type</h2>
      <div id="kindFilters"></div>
    </div>

    <div class="grp mapOnly">
      <h2>Connections</h2>
      <div id="edgeFilters"></div>
    </div>

    <div class="grp mapOnly">
      <h2>Camera</h2>
      <div id="cameraOptions"></div>
    </div>

    <div class="grp mapOnly">
      <button class="act" id="reset">Reset view &amp; filters</button>
    </div>
  </aside>

  <aside class="panel" id="inspect"></aside>
  <div class="panel" id="workingNow"></div>
  <div class="panel" id="hud">—</div>
  <div id="tip"></div>

</body>
</html>
